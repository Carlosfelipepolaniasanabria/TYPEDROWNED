<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeQuest — Juego de Mecanografía</title>
  <link rel="stylesheet" href="../style/index1.css" />
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Oxanium:wght@400;600;700;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
  #user-hud {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 14px;
    padding: 14px 22px;
    background: linear-gradient(90deg, rgba(5,10,30,0.92), rgba(10,18,45,0.88));
    border-bottom: 1px solid rgba(0, 245, 255, 0.25);
    box-shadow: 0 0 20px rgba(0, 245, 255, 0.08);
    font-family: 'Oxanium', sans-serif;
    font-size: 15px;
    pointer-events: none;
  }

  #user-label {
    color: #00f5ff;
    letter-spacing: 1.5px;
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(0,245,255,0.45);
  }

  .hud-btn {
    pointer-events: all;
    background: rgba(0, 229, 255, 0.08);
    border: 1px solid rgba(0, 229, 255, 0.4);
    border-radius: 12px;
    padding: 8px 16px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #dffaff;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  }

  .hud-btn:hover {
    transform: translateY(-1px) scale(1.03);
    background: rgba(0, 229, 255, 0.16);
    box-shadow: 0 0 18px rgba(0, 229, 255, 0.18);
  }

  .hud-btn.logout {
    border-color: rgba(255, 90, 90, 0.45);
    color: #ffb4b4;
    background: rgba(255, 80, 80, 0.08);
  }

  .hud-btn.logout:hover {
    background: rgba(255, 80, 80, 0.16);
    box-shadow: 0 0 18px rgba(255, 80, 80, 0.15);
  }

  .hud-sep {
    color: #2b4671;
  }

  #game-container {
    padding-top: 56px;
  }
</style>
</head>
<body>

  <!--
    HUD de usuario
    Se construye dinámicamente según si hay sesión activa o no.
    - Usuario logueado: muestra nombre + botón "Cerrar Sesión"
    - Invitado: muestra "INVITADO" + botones "Iniciar Sesión" y "Registrarse"
  -->
  <div id="user-hud">
    <!-- Se llenará con JavaScript según el estado de sesión -->
  </div>

  <!-- Contenedor del juego Phaser -->
  <div id="game-container"></div>

  <!--
    auth.js debe cargarse ANTES del script del juego
    para que getCurrentUser() y logoutUser() estén disponibles
  -->
  <script src="../js/auth.js"></script>

  <script>
    // ===================================================
    //  HUD de usuario para index1.html
    //  Lee el estado de sesión de auth.js y construye
    //  la barra de usuario de forma dinámica
    // ===================================================

    /**
     * Construye y muestra el HUD según el estado de sesión actual
     */
    function buildUserHUD() {
      const hud  = document.getElementById('user-hud');
      const user = getCurrentUser(); // Función de auth.js

      if (user) {
        // ── Usuario logueado: mostrar nombre y opción de cerrar sesión ──
        hud.innerHTML = `
          <span id="user-label">👤 ${user.username}</span>
          <span class="hud-sep">|</span>
          <button class="hud-btn logout" id="btn-logout">Cerrar Sesión</button>
        `;

        // Cerrar sesión al hacer clic
        document.getElementById('btn-logout').addEventListener('click', function () {
          logoutUser(); // Función de auth.js: elimina la sesión de localStorage
          // Redirigir al login tras cerrar sesión
          window.location.href = 'login.html';
        });

      } else {
        // ── Sin sesión: mostrar "INVITADO" y botones de acceso ──
        // El invitado puede jugar pero su progreso se borra al recargar
        hud.innerHTML = `
          <span id="user-label">👾 INVITADO</span>
          <span class="hud-sep">|</span>
          <button class="hud-btn" id="btn-login-hud">Iniciar Sesión</button>
          <button class="hud-btn" id="btn-register-hud">Registrarse</button>
        `;

        document.getElementById('btn-login-hud').addEventListener('click', function () {
          window.location.href = 'login.html';
        });

        document.getElementById('btn-register-hud').addEventListener('click', function () {
          window.location.href = 'register.html';
        });
      }
    }

    // Construir el HUD al cargar la página
    buildUserHUD();
  </script>

  <!-- Script principal del menú Phaser (no modificado) -->
  <script src="../js/index1.js"></script>
</body>
</html>
