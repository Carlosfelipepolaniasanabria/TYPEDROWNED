<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TypeDrowned — Crear Cuenta</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../style/register.css"/>
</head>
<body>

  <!-- ── Fondo estrellado ── -->
  <div class="stars" id="stars"></div>

  <div class="register-wrap">
    <div class="register-panel">

      <!-- Logo con acento verde (diferencia del login azul) -->
      <div class="register-logo">TypeDrowned</div>
      <p class="register-subtitle">— Nueva Cuenta —</p>

      <!-- Muñeco en verde (coherente con el nivel 1) -->
      <div class="figure-wrap">
        <svg width="52" height="66" viewBox="0 0 72 90" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="36" cy="14" r="11" stroke="#22dd66" stroke-width="2.5" fill="none"/>
          <line x1="36" y1="25" x2="36" y2="58" stroke="#22dd66" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="36" y1="35" x2="14" y2="50" stroke="#22dd66" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="36" y1="35" x2="58" y2="50" stroke="#22dd66" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="36" y1="58" x2="18" y2="84" stroke="#22dd66" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="36" y1="58" x2="54" y2="84" stroke="#22dd66" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>

      <hr class="neon-line"/>

      <!-- ── Caja de mensajes de feedback ── -->
      <div class="msg-box" id="msg-box"></div>

      <!-- ── Campo: nombre de usuario ── -->
      <div class="field-group">
        <label class="field-label" for="username">Nombre de usuario</label>
        <input
          class="field-input"
          type="text"
          id="username"
          placeholder="mínimo 3 caracteres"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="none"
          spellcheck="false"
        />
      </div>

      <!-- ── Campo: contraseña ── -->
      <div class="field-group">
        <label class="field-label" for="password">Contraseña</label>
        <input
          class="field-input"
          type="password"
          id="password"
          placeholder="mínimo 4 caracteres"
        />
        <!-- Indicador visual de fuerza de la contraseña -->
        <div class="strength-bar-wrap">
          <div class="strength-seg" id="seg1"></div>
          <div class="strength-seg" id="seg2"></div>
          <div class="strength-seg" id="seg3"></div>
          <div class="strength-seg" id="seg4"></div>
        </div>
        <p class="strength-label" id="strength-label">— fuerza de contraseña —</p>
      </div>

      <!-- ── Campo: confirmar contraseña ── -->
      <div class="field-group">
        <label class="field-label" for="password2">Confirmar contraseña</label>
        <input
          class="field-input"
          type="password"
          id="password2"
          placeholder="repite la contraseña"
        />
      </div>

      <!-- ── Botón: crear cuenta ── -->
      <button class="btn-primary" id="btn-register">✦ Crear Cuenta</button>

      <!-- ── Enlace: volver al login ── -->
      <p class="link-row">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </p>

      <p class="register-footer">Los datos se guardan en tu navegador · Sin servidor</p>
    </div>
  </div>

  <!-- ── Módulo de autenticación (contiene registerUser, loginUser, etc.) ── -->
  <script src="../js/auth.js"></script>

  <script>
    // ===================================================
    //  Lógica de register.html
    //  - Genera estrellas de fondo
    //  - Muestra indicador de fuerza de contraseña
    //  - Valida y registra el nuevo usuario
    //  - Redirige al login tras registro exitoso
    // ===================================================

    // ── Generar estrellas ──
    (function generateStars() {
      const container = document.getElementById('stars');
      for (let i = 0; i < 160; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.2 + 0.6;
        s.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          top: ${Math.random() * 100}%;
          left: ${Math.random() * 100}%;
          animation-duration: ${2 + Math.random() * 4}s;
          animation-delay: ${Math.random() * 5}s;
        `;
        container.appendChild(s);
      }
    })();

    // ── Referencias ──
    const msgBox      = document.getElementById('msg-box');
    const pwdInput    = document.getElementById('password');
    const btnRegister = document.getElementById('btn-register');
    const segs        = [
      document.getElementById('seg1'),
      document.getElementById('seg2'),
      document.getElementById('seg3'),
      document.getElementById('seg4'),
    ];
    const strengthLabel = document.getElementById('strength-label');

    // ── Mensajes de feedback ──
    function showMsg(text, type) {
      msgBox.textContent = text;
      msgBox.className = 'msg-box ' + type;
    }
    function clearMsg() {
      msgBox.className = 'msg-box';
      msgBox.textContent = '';
    }

    /**
     * Calcula la fuerza de una contraseña (1-4)
     * Criterios: longitud, números, mayúsculas, símbolos
     * @param {string} pwd
     * @returns {number} 0-4
     */
    function calcStrength(pwd) {
      let score = 0;
      if (pwd.length >= 4)  score++;
      if (pwd.length >= 8)  score++;
      if (/[0-9]/.test(pwd)) score++;
      if (/[^a-zA-Z0-9]/.test(pwd)) score++;
      return score;
    }

    /**
     * Actualiza visualmente la barra de fuerza
     * y la etiqueta de texto descriptiva
     */
    function updateStrengthBar() {
      const pwd = pwdInput.value;
      const strength = calcStrength(pwd);
      const labels = ['', 'Débil', 'Regular', 'Buena', '¡Fuerte!'];
      const classes = ['', 'active-1', 'active-2', 'active-3', 'active-4'];

      // Colorear los segmentos según la fuerza
      segs.forEach(function (seg, i) {
        seg.className = 'strength-seg';
        if (i < strength) seg.classList.add(classes[strength]);
      });

      strengthLabel.textContent = pwd.length === 0
        ? '— fuerza de contraseña —'
        : labels[strength] || 'Muy débil';
    }

    // Actualizar barra cada vez que cambia la contraseña
    pwdInput.addEventListener('input', updateStrengthBar);

    // ── Manejar clic en "Crear Cuenta" ──
    btnRegister.addEventListener('click', function () {
      clearMsg();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;

      // Validar que las contraseñas coincidan antes de llamar a auth.js
      if (password !== password2) {
        showMsg('Las contraseñas no coinciden.', 'error');
        return;
      }

      // Llamar a la función de auth.js para registrar al usuario
      // auth.js valida longitud mínima, duplicados, etc.
      const result = registerUser(username, password);

      if (result.success) {
        showMsg(result.message + ' Redirigiendo...', 'success');
        // Tras registro exitoso, redirigir al login para que inicie sesión
        setTimeout(function () {
          window.location.href = 'login.html';
        }, 1500);
      } else {
        showMsg(result.message, 'error');
      }
    });

    // ── ENTER para enviar ──
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') btnRegister.click();
    });

    // ── Si ya hay sesión activa, ir directamente al juego ──
    if (isLoggedIn()) {
      window.location.href = 'index1.html';
    }
  </script>
</body>
</html>
